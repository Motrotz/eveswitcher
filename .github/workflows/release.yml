name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi python3-gi-cairo gir1.2-gtk-3.0 libappindicator3-1 gir1.2-appindicator3-0.1

      - name: Install Python dependencies
        run: |
          pip install pyinstaller python-xlib pystray Pillow

      - name: Build PyInstaller binary
        run: |
          pyinstaller --onefile --add-data "assets:assets" eveswitcher/__main__.py --name eveswitcher

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create source archive
        run: |
          git archive --format=tar.gz --prefix=eveswitcher-${{ steps.version.outputs.VERSION }}/ -o eveswitcher-${{ steps.version.outputs.VERSION }}-source.tar.gz HEAD

      - name: Prepare release files
        run: |
          mkdir -p release
          cp dist/eveswitcher release/eveswitcher-${{ steps.version.outputs.VERSION }}-linux-x86_64
          cp config.example.json release/
          cp eveswitcher-${{ steps.version.outputs.VERSION }}-source.tar.gz release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/eveswitcher-${{ steps.version.outputs.VERSION }}-linux-x86_64
            release/config.example.json
            release/eveswitcher-${{ steps.version.outputs.VERSION }}-source.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
